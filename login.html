<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SG Admin Login</title>
  <style>
    :root {
      --dark: #0b2239;
      --accent: #0b66ff;
      --white: #ffffff;
    }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--dark);
      color: var(--white);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .login-box {
      background: rgba(255,255,255,0.05);
      padding: 30px;
      border-radius: 12px;
      width: 300px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    h2 {
      margin-bottom: 20px;
      color: var(--white);
    }
    input[type="password"] {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      margin-bottom: 16px;
      background: rgba(255,255,255,0.1);
      color: var(--white);
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: var(--white);
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    button:hover {
      background: #3380ff;
    }
    .error {
      color: #ff5b5b;
      font-size: 13px;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>SG Admin Login</h2>
    <input id="password" type="password" placeholder="Enter admin password">
    <button id="loginBtn">Login</button>
    <div id="error" class="error">Incorrect password. Try again.</div>
  </div>

  <script>
    document.getElementById("loginBtn").addEventListener("click", function() {
      const input = document.getElementById("password").value;
      if (input === "SGadmin01") {
        localStorage.setItem("sg-logged-in", "true");
        window.location.href = "index.html";
      } else {
        document.getElementById("error").style.display = "block";
      }
    });

    // Optional: allow pressing "Enter" to submit
    document.getElementById("password").addEventListener("keyup", function(e) {
      if (e.key === "Enter") {
        document.getElementById("loginBtn").click();
      }
    });
  </script>
</body>
</html>
